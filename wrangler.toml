name = "dplmia"
main = "dist/server/server.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "dist/client"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "dplmia-uploads"

[vars]
NODE_ENV = "production"
# Secrets — set via: wrangler secret put <NAME>
# DATABASE_URL
# R2_PUBLIC_URL
# BETTER_AUTH_SECRET      (openssl rand -base64 32)
# BETTER_AUTH_BASE_URL    (https://dplmia.cedric-duperron.workers.dev)
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# MICROSOFT_CLIENT_ID
# MICROSOFT_CLIENT_SECRET
# SLACK_CLIENT_ID
# SLACK_CLIENT_SECRET

[observability.logs]
enabled = true
invocation_logs = true
